<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アイコンフレーム合成ツール</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>アイコンフレーム合成ツール</h1>
            created by
            <a href="https://x.com/kairi_005" target="_blank">@kairi_005</a>
            /
            <a href="https://github.com/kairi003/icon-frame-composite-tool" target="_blank">github</a>
        </header>

        <div class="main-content">
            <div class="canvas-section">
                <h2>プレビュー</h2>
                <div class="canvas-container">
                    <canvas id="canvas" width="300" height="300"></canvas>
                </div>
            </div>

            <div class="control-section">

                <div class="input-group">
                    <label for="frameInput" class="input-label">1. フレーム画像</label>
                    <input type="file" id="frameInput" accept="image/*" class="file-input">
                </div>

                <div class="input-group">
                    <label for="iconInput" class="input-label">2. アイコン画像</label>
                    <input type="file" id="iconInput" accept="image/*" disabled class="file-input">
                </div>

                <div class="input-group">
                    <label for="scaleInput" class="input-label">3. サイズ調整</label>
                    <div class="scale-control">
                        <input type="range" id="scaleInput" min="0" max="1" step="0.01" value="1" disabled class="range-input">
                    </div>
                </div>

                <a id="downloadButton" class="download-button" download="composite.png">Download</a>
            </div>
        </div>
    </div>
</body>
</html>
